<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>What to Watch</title> <!-- Title in the browser tab -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: linear-gradient(-45deg, #0a0a0a, #1c1c1c, #111, #222);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
            flex: 1;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #e50914;
            text-shadow: 0 0 10px rgba(229,9,20,0.7), 0 0 20px rgba(229,9,20,0.4);
            animation: pulse-title 3s infinite alternate;
        }

        @keyframes pulse-title {
            from { text-shadow: 0 0 10px rgba(229,9,20,0.7), 0 0 20px rgba(229,9,20,0.4);}
            to   { text-shadow: 0 0 20px rgba(229,9,20,1), 0 0 40px rgba(229,9,20,0.6);}
        }

        p.tagline {
            font-size: 1.2rem;
            color: #ccc;
            max-width: 500px;
            margin: 10px 0 30px;
            opacity: 0;
            animation: fadeInText 2s ease forwards;
        }

        @keyframes fadeInText {
            to { opacity: 1; }
        }

        .menu {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
        }

        .boton {
            position: relative;
            background-color: #e50914;
            color: white;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            padding: 20px 50px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.3s, background-color 0.3s;
            box-shadow: 0 0 15px rgba(229,9,20,0.6), 0 0 40px rgba(229,9,20,0.3);
            overflow: hidden;
        }

        .boton:hover {
            transform: scale(1.05);
            background-color: #ff1c2b;
            box-shadow: 0 0 30px rgba(229,9,20,0.8), 0 0 60px rgba(229,9,20,0.5);
        }

        .boton::after {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 10px;
            background: linear-gradient(45deg, #ff1c2b, #e50914, #ff1c2b);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: -1;
        }

        .boton:hover::after {
            opacity: 0.6;
        }

        footer.tmdb-footer {
            padding: 15px;
            font-size: 11px;
            color: #aaa;
            text-align: center;
            border-top: 1px solid #222;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        footer.tmdb-footer img {
            height: 18px;
            opacity: 0.7;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.2rem;
            }
            .boton {
                font-size: 1.4rem;
                padding: 15px 35px;
            }
            p.tagline {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>What to Watch</h1>
        <p class="tagline">Discover your next favorite series or movie in seconds</p>

        <div class="menu">
            <a href="/peliculas" class="boton">MOVIES</a>
            <a href="/series" class="boton">SERIES</a>
        </div>
    </div>

    <footer class="tmdb-footer">
        <img src="https://www.themoviedb.org/assets/2/v4/logos/v2/blue_short-8e7b30f73a4020692ccca9c88bafe5dcb6f8a62a4c6bc55cd9ba82bb2cd95f6c.svg" 
             alt="TMDB Logo">
        <span>This product uses the TMDB API but is not endorsed or certified by TMDB.</span>
    </footer>
</body>
</html>

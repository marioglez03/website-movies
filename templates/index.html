<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recomendador de Películas y Series</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* Fuentes modernas */
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1c1c1c);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Contenedor principal */
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 50px 20px;
            flex: 1;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #e50914;
            text-shadow: 0 0 10px rgba(229,9,20,0.7), 0 0 20px rgba(229,9,20,0.4);
            animation: pulse-title 3s infinite alternate;
        }

        @keyframes pulse-title {
            from { text-shadow: 0 0 10px rgba(229,9,20,0.7), 0 0 20px rgba(229,9,20,0.4);}
            to   { text-shadow: 0 0 20px rgba(229,9,20,1), 0 0 40px rgba(229,9,20,0.6);}
        }

        p.tagline {
            font-size: 1.2rem;
            color: #ccc;
            max-width: 500px;
            margin: 15px 0 50px;
        }

        /* Botones */
        .menu {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
        }

        .boton {
            background-color: #e50914;
            color: white;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            padding: 20px 50px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.3s, background-color 0.3s;
            box-shadow: 0 0 15px rgba(229,9,20,0.6), 0 0 40px rgba(229,9,20,0.3);
        }

        .boton:hover {
            transform: scale(1.05);
            background-color: #ff1c2b;
            box-shadow: 0 0 30px rgba(229,9,20,0.8), 0 0 60px rgba(229,9,20,0.5);
        }

        /* Footer TMDB discreto */
        footer.tmdb-footer {
            padding: 15px;
            font-size: 12px;
            color: #888;
            text-align: center;
            border-top: 1px solid #222;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        footer.tmdb-footer img {
            height: 18px;
            opacity: 0.7;
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 {
                font-size: 2.2rem;
            }
            .boton {
                font-size: 1.4rem;
                padding: 15px 35px;
            }
            p.tagline {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Movie & Series Recommender</h1>
        <p class="tagline">Descubre tu próxima serie o película favorita en segundos</p>

        <div class="menu">
            <a href="/peliculas" class="boton">PELÍCULAS</a>
            <a href="/series" class="boton">SERIES</a>
        </div>
    </div>

    <footer class="tmdb-footer">
        <img src="https://www.themoviedb.org/assets/2/v4/logos/v2/blue_short-8e7b30f73a4020692ccca9c88bafe5dcb6f8a62a4c6bc55cd9ba82bb2cd95f6c.svg" 
             alt="TMDB Logo">
        <span>Este producto usa la API de TMDB, pero no está respaldado ni certificado por TMDB.</span>
    </footer>
</body>
</html>

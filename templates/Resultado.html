<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Resultado</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .retry-button {
            margin-top: 25px;
            padding: 12px 25px;
            font-size: 1.2em;
            font-weight: bold;
            background-color: #1a1a1a; /* negro oscuro */
            color: #e63946; /* rojo */
            border: 2px solid #e63946;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .retry-button:hover {
            background-color: #e63946;
            color: #ffffff;
            border: 2px solid #e63946;
        }

        h1 {
            color: #ffffff;
            text-align: center;
            margin-top: 30px;
            font-size: 2em;
        }

        .poster-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .poster {
            max-width: 300px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
        }

        .tmdb-footer {
            text-align: center;
            margin-top: 40px;
            color: #aaa;
            font-size: 0.8em;
        }

        .tmdb-footer img {
            height: 20px;
            vertical-align: middle;
            margin-right: 5px;
        }
    </style>
</head>
<body class="fondo-negro">

    {% if recomendacion %}
        <h1>Te recomendamos ver: {{ recomendacion }}</h1>

        <div class="poster-container">
            <img id="poster-img" src="" alt="Poster de {{ recomendacion }}" class="poster" style="display:none;">
            <p id="poster-error" style="display:none; color: #aaa;">No se encontró poster.</p>
        </div>

        <!-- Botón para intentar de nuevo según tipo -->
        <form action="{% if tipo == 'movie' %}{{ url_for('peliculas') }}{% else %}{{ url_for('series') }}{% endif %}?reiniciar=1" method="get">
            <button type="submit" class="retry-button">Elige otra película</button>
        </form>

        <footer class="tmdb-footer">
            <img src="https://www.themoviedb.org/assets/2/v4/logos/v2/blue_short-8e7b30f73a4020692ccca9c88bafe5dcb6f8a62a4c6bc55cd9ba82bb2cd95f6c.svg" 
                 alt="TMDB Logo" class="tmdb-logo">
            <span>Este producto usa la API de TMDB, pero no está respaldado ni certificado por TMDB.</span>
        </footer>
    {% else %}
        <h2 style="color:white; text-align:center;">⚠️ No se encontraron coincidencias.</h2>
        <form action="{% if tipo == 'movie' %}{{ url_for('peliculas') }}{% else %}{{ url_for('series') }}{% endif %}?reiniciar=1" method="get">
            <button type="submit" class="retry-button">Intentar de nuevo</button>
        </form>
    {% endif %}

    <script>
        const TMDB_API_KEY = "{{ tmdb_key }}";
        const titulo = {{ recomendacion | tojson }};
        const tipo = "{{ tipo }}";

        if (titulo) {
            const endpoint = tipo === "tv"
                ? `https://api.themoviedb.org/3/search/tv?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(titulo)}&language=es-ES`
                : `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(titulo)}&language=es-ES`;

            fetch(endpoint)
                .then(res => res.json())
                .then(data => {
                    if (data.results && data.results.length > 0 && data.results[0].poster_path) {
                        const img = document.getElementById("poster-img");
                        img.src = `https://image.tmdb.org/t/p/w500${data.results[0].poster_path}`;
                        img.style.display = "block";
                    } else {
                        document.getElementById("poster-error").style.display = "block";
                    }
                })
                .catch(() => {
                    document.getElementById("poster-error").style.display = "block";
                });
        }
    </script>

</body>
</html>

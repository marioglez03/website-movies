<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Resultado</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* Botón "retry" adaptado a tu CSS */
        .retry-button {
            margin-top: 25px;
            padding: 14px 28px;
            font-size: 1.2em;
            font-weight: 700;
            background-color: #1a1a1a;
            color: #e50914;
            border: 2px solid #e50914;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .retry-button:hover {
            background-color: #e50914;
            color: #ffffff;
            box-shadow:
                0 0 20px rgba(229,9,20,0.8),
                0 0 40px rgba(229,9,20,0.6),
                0 0 80px rgba(229,9,20,0.4);
        }

        h1 {
            font-family: 'Bebas Neue', 'Montserrat', sans-serif;
            color: #fff;
            text-align: center;
            margin-top: 30px;
            font-size: 2.4rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow:
                0 0 8px rgba(229, 9, 20, 0.9),
                0 0 24px rgba(229, 9, 20, 0.6),
                0 0 60px rgba(229, 9, 20, 0.3);
            animation: pulso-titulo 3s ease-in-out infinite alternate;
        }

        .poster-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .poster {
            width: min(280px, 80vw);
            border-radius: 10px;
            box-shadow:
                0 0 20px rgba(229, 9, 20, 0.8),
                0 0 60px rgba(229, 9, 20, 0.4),
                0 0 120px rgba(229, 9, 20, 0.2),
                0 8px 40px rgba(0,0,0,0.9);
            transition: transform 0.3s;
            animation: pulso-poster 2.8s ease-in-out infinite alternate;
        }

        .poster:hover {
            transform: scale(1.04);
        }

        @keyframes pulso-titulo {
            from { text-shadow: 0 0 8px rgba(229,9,20,0.9), 0 0 24px rgba(229,9,20,0.5); }
            to   { text-shadow: 0 0 14px rgba(229,9,20,1),  0 0 40px rgba(229,9,20,0.8), 0 0 80px rgba(229,9,20,0.4); }
        }

        @keyframes pulso-poster {
            from { box-shadow: 0 0 18px rgba(229,9,20,0.7), 0 0 50px rgba(229,9,20,0.35); }
            to   { box-shadow: 0 0 30px rgba(229,9,20,1),   0 0 80px rgba(229,9,20,0.6), 0 0 140px rgba(229,9,20,0.3); }
        }

        .tmdb-footer {
            margin-top: 40px;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            color: #666;
            font-size: 12px;
            border-top: 1px solid #1a1a1a;
            text-align: center;
        }

        .tmdb-logo {
            height: 22px;
            vertical-align: middle;
            opacity: 0.7;
        }
    </style>
</head>
<body class="fondo-negro">

    {% if recomendacion %}
        <h1>Te recomendamos ver: {{ recomendacion }}</h1>

        <div class="poster-container">
            <img id="poster-img" src="" alt="Poster de {{ recomendacion }}" class="poster" style="display:none;">
            <p id="poster-error" style="display:none; color: #aaa;">No se encontró poster.</p>
        </div>

        <form action="{% if tipo == 'movie' %}{{ url_for('peliculas') }}{% else %}{{ url_for('series') }}{% endif %}" method="get">
            <input type="hidden" name="reiniciar" value="1">
            <button type="submit" class="retry-button">{% if tipo == 'movie' %}Elige otra película{% else %}Elige otra serie{% endif %}</button>
        </form>

    {% else %}
        <h2>⚠️ No se encontraron coincidencias.</h2>
        <form action="{% if tipo == 'movie' %}{{ url_for('peliculas') }}{% else %}{{ url_for('series') }}{% endif %}" method="get">
            <input type="hidden" name="reiniciar" value="1">
            <button type="submit" class="retry-button">Intentar de nuevo</button>
        </form>
    {% endif %}

    <footer class="tmdb-footer">
        <img src="https://www.themoviedb.org/assets/2/v4/logos/v2/blue_short-8e7b30f73a4020692ccca9c88bafe5dcb6f8a62a4c6bc55cd9ba82bb2cd95f6c.svg" 
             alt="TMDB Logo" class="tmdb-logo">
        <span>Este producto usa la API de TMDB, pero no está respaldado ni certificado por TMDB.</span>
    </footer>

    <script>
        const TMDB_API_KEY = "{{ tmdb_key }}";
        const titulo = {{ recomendacion | tojson }};
        const tipo = "{{ tipo }}";

        if (titulo) {
            const endpoint = tipo === "tv"
                ? `https://api.themoviedb.org/3/search/tv?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(titulo)}&language=es-ES`
                : `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(titulo)}&language=es-ES`;

            fetch(endpoint)
                .then(res => res.json())
                .then(data => {
                    if (data.results && data.results.length > 0 && data.results[0].poster_path) {
                        const img = document.getElementById("poster-img");
                        img.src = `https://image.tmdb.org/t/p/w500${data.results[0].poster_path}`;
                        img.style.display = "block";
                    } else {
                        document.getElementById("poster-error").style.display = "block";
                    }
                })
                .catch(() => {
                    document.getElementById("poster-error").style.display = "block";
                });
        }
    </script>

</body>
</html>

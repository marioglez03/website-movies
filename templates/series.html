<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Choose Your Series</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* Logo en la esquina superior izquierda */
        .logo-top-left {
            position: absolute;
            top: 16px;
            left: 16px;
            width: 120px;
            height: auto;
            z-index: 1000;
        }

        @media (max-width: 600px) {
            .logo-top-left {
                width: 90px;
                top: 10px;
                left: 10px;
            }
        }

        @media (max-width: 400px) {
            .logo-top-left {
                width: 70px;
                top: 8px;
                left: 8px;
            }
        }
    </style>
</head>
<body class="fondo-negro">

    <!-- Logo arriba a la izquierda -->
    <img src="{{ url_for('static', filename='Logo.jpg') }}" alt="Logo" class="logo-top-left">

    <h1>Round {{ ronda }} of 5: Choose a Series</h1>

    <form method="POST" id="form-eleccion">
        <div class="opciones">
            <button type="submit" name="pelicula" value="{{ serie1 }}" class="card-pelicula">
                <img id="poster1" src="" alt="{{ serie1 }}" class="poster-card">
                <span class="titulo-card">{{ serie1 }}</span>
            </button>

            <button type="submit" name="pelicula" value="{{ serie2 }}" class="card-pelicula">
                <img id="poster2" src="" alt="{{ serie2 }}" class="poster-card">
                <span class="titulo-card">{{ serie2 }}</span>
            </button>
        </div>
    </form>

    <script>
        const TMDB_API_KEY = "{{ tmdb_key }}";
        const serie1 = {{ serie1 | tojson }};
        const serie2 = {{ serie2 | tojson }};
        const PLACEHOLDER = "https://via.placeholder.com/300x450/1a1a1a/666666?text=No+Poster";

        async function cargarPoster(titulo, imgId) {
            const img = document.getElementById(imgId);
            try {
                const res = await fetch(
                    `https://api.themoviedb.org/3/search/tv?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(titulo)}&language=en-US`
                );
                const data = await res.json();
                if (data.results && data.results.length > 0 && data.results[0].poster_path) {
                    img.src = `https://image.tmdb.org/t/p/w500${data.results[0].poster_path}`;
                } else {
                    img.src = PLACEHOLDER;
                }
            } catch {
                img.src = PLACEHOLDER;
            }
        }

        cargarPoster(serie1, "poster1");
        cargarPoster(serie2, "poster2");
    </script>

</body>
</html>

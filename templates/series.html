<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Choose Your Series</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="fondo-negro">
    <h1>Round {{ ronda }} of 5: Choose a Series</h1>

    <form method="POST" id="choice-form">
        <div class="options">

            <button type="submit" name="series" value="{{ serie1 }}" class="series-card">
                <img id="poster1" src="" alt="{{ serie1 }}" class="poster-card">
                <span class="card-title">{{ serie1 }}</span>
            </button>

            <button type="submit" name="series" value="{{ serie2 }}" class="series-card">
                <img id="poster2" src="" alt="{{ serie2 }}" class="poster-card">
                <span class="card-title">{{ serie2 }}</span>
            </button>

        </div>
    </form>

    <script>
        const TMDB_API_KEY = "{{ tmdb_key }}";
        const series1 = {{ serie1 | tojson }};
        const series2 = {{ serie2 | tojson }};

        const PLACEHOLDER = "https://via.placeholder.com/300x450/1a1a1a/666666?text=No+Poster";

        async function loadPoster(title, imgId) {
            const img = document.getElementById(imgId);
            try {
                const res = await fetch(
                    `https://api.themoviedb.org/3/search/tv?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(title)}&language=en-US`
                );
                const data = await res.json();
                if (data.results && data.results.length > 0 && data.results[0].poster_path) {
                    img.src = `https://image.tmdb.org/t/p/w500${data.results[0].poster_path}`;
                } else {
                    img.src = PLACEHOLDER;
                }
            } catch {
                img.src = PLACEHOLDER;
            }
        }

        loadPoster(series1, "poster1");
        loadPoster(series2, "poster2");
    </script>
</body>
</html>
